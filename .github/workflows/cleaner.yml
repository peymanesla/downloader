name: 🗑 Clean downloads folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside downloads/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout only downloads folder (fast)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: downloads
          sparse-checkout-cone-mode: false

      - name: Delete all files inside downloads/
        run: |
          rm -rf downloads/*
          mkdir -p downloads

      - name: Commit and push empty folder
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Empty downloads folder [skip ci]" || echo "No changes to commit"
          git push
